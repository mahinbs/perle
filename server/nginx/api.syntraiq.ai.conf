##
## Nginx reverse proxy for Perle backend (runs from this /server folder)
## - Proxies https://api.syntraiq.ai -> http://127.0.0.1:3333
##

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream perle_backend {
  server 127.0.0.1:3333;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name api.syntraiq.ai;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/_letsencrypt;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.syntraiq.ai;

  # Certbot default paths (update if yours differ)
  ssl_certificate     /etc/letsencrypt/live/api.syntraiq.ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.syntraiq.ai/privkey.pem;

  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 10m;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_pass http://perle_backend;
  }
}

